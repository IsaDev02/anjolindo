<div class="banner-carrossel-space" style="margin-top: 0;">
    <!-- Espaço reservado para o banner carrossel -->
    <span class="text-muted">Banner carrossel aqui</span>
</div>

    <main class="container mb-5">
        <div id="loading">
            <div class="spinner-border text-danger" role="status"></div>
            <span class="ms-3">Buscando peças...</span>
        </div>
        
        <div class="row row-cols-1 row-cols-md-3 g-4" id="lista-produtos">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // CONFIGURAÇÕES DO SEU PROJETO
        const SUPABASE_URL = 'https://vzhmjwdsemmyojsflqdm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6aG1qd2RzZW1teW9qc2ZscWRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzU1ODcsImV4cCI6MjA4OTQxMTU4N30.rtL8WPzkg0wi78IK72Mwx6MWZ-W1DI6BG3XxqSJd40k';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarProdutos() {
            const container = document.getElementById('lista-produtos');
            const loading = document.getElementById('loading');

            try {
                // Busca os dados da tabela 'produtos'
                const { data, error } = await _supabase
                    .from('produtos')
                    .select('*')
                    .order('criado_em', { ascending: false });

                if (error) throw error;

                loading.style.display = 'none';
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center w-100 py-5">
                            <p class="text-muted">Ainda não há produtos cadastrados.</p>
                            <small>Use o seu painel administrativo para adicionar peças.</small>
                        </div>`;
                    return;
                }

                data.forEach(item => {
                    const card = `
                        <div class="col">
                            <div class="card h-100">
                                <img src="${item.imagem_url || 'https://via.placeholder.com/400x400?text=Foto+em+breve'}" 
                                     class="card-img-top" 
                                     alt="${item.nome}">
                                <div class="card-body">
                                    <h5 class="card-title fw-bold">${item.nome}</h5>
                                    <p class="card-text text-muted small text-truncate">${item.descricao || 'Sem descrição.'}</p>
                                    <div class="d-flex justify-content-between align-items-center mt-3">
                                        <span class="price-tag">R$ ${parseFloat(item.preco).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                                        <button class="btn btn-primary btn-sm px-3">Ver Detalhes</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

            } catch (err) {
                console.error("Erro técnico:", err.message);
                loading.style.display = 'none';
                container.innerHTML = `
                    <div class="alert alert-danger w-100">
                        Houve um erro ao carregar o catálogo. Detalhe: ${err.message}
                    </div>`;
            }
        }

        // Inicia a execução ao abrir a página
        carregarProdutos();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
